<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <!-- Immediate redirect (fallback if JS disabled) -->
    <meta http-equiv="refresh" content="0; url=https://app.edentu.com/">

    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script>
        // Fastest redirect method
        window.location.replace("https://app.edentu.com/");
    </script>
</head>
<body>
</body>
</html>
